    <!-- Bootstrap CSS -->

    <div class="container my-5">
      <h2 class="text-center mb-4">Danh sách sản phẩm</h2>

      <table class="table table-striped table-bordered align-middle">
        <thead>
          <tr>
            <th>STT</th>
            <th>Tên sách</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th>Tác giả</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="renderBody">
          <!-- Sản phẩm 1 -->
          <tr>
            <td>1</td>
            <td>Laptop Dell Inspiron 15</td>
            <td>18,500,000đ</td>
            <td>Laptop</td>
            <td>12</td>
            <td>
              <button class="btn btn-sm btn-primary me-2">Sửa</button>
              <button class="btn btn-sm btn-danger">Xóa</button>
            </td>
          </tr>

          <!-- Sản phẩm 2 -->
          <tr>
            <td>2</td>
            <td>iPhone 13</td>
            <td>15,900,000đ</td>
            <td>Điện thoại</td>
            <td>8</td>
            <td>
              <button class="btn btn-sm btn-primary me-2">Sửa</button>
              <button class="btn btn-sm btn-danger">Xóa</button>
            </td>
          </tr>

          <!-- Sản phẩm 3 -->
          <tr>
            <td>3</td>
            <td>Tai nghe Sony WH-1000XM4</td>
            <td>6,500,000đ</td>
            <td>Phụ kiện</td>
            <td>15</td>
            <td>
              <button class="btn btn-sm btn-primary me-2">Sửa</button>
              <button class="btn btn-sm btn-danger">Xóa</button>
            </td>
          </tr>
        </tbody>
      </table>
