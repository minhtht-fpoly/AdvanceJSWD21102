<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Danh sách sản phẩm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
    .table thead th {
      background-color: #0d6efd;
      color: white;
    }
  </style>
</head>
<body>

<div class="container my-5">
  <h2 class="text-center mb-4">Danh sách sản phẩm</h2>

  <table class="table table-striped table-bordered align-middle">
    <thead>
      <tr>
        <th>ID</th>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Danh mục</th>
        <th>Tồn kho</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody id="renderBody">
      <!-- Sản phẩm 1 -->
      <tr>
        <td>1</td>
        <td>Laptop Dell Inspiron 15</td>
        <td>18,500,000đ</td>
        <td>Laptop</td>
        <td>12</td>
        <td>
          <button class="btn btn-sm btn-primary me-2">Sửa</button>
          <button class="btn btn-sm btn-danger">Xóa</button>
        </td>
      </tr>

      <!-- Sản phẩm 2 -->
      <tr>
        <td>2</td>
        <td>iPhone 13</td>
        <td>15,900,000đ</td>
        <td>Điện thoại</td>
        <td>8</td>
        <td>
          <button class="btn btn-sm btn-primary me-2">Sửa</button>
          <button class="btn btn-sm btn-danger">Xóa</button>
        </td>
      </tr>

      <!-- Sản phẩm 3 -->
      <tr>
        <td>3</td>
        <td>Tai nghe Sony WH-1000XM4</td>
        <td>6,500,000đ</td>
        <td>Phụ kiện</td>
        <td>15</td>
        <td>
          <button class="btn btn-sm btn-primary me-2">Sửa</button>
          <button class="btn btn-sm btn-danger">Xóa</button>
        </td>
      </tr>

    </tbody>
  </table>
</div>
<div style="background-color: greenyellow;"></div>
<script src="./lesson5.js"></script>
</body>
</html>
